openapi: 3.0.3
info:
  description: "API per la gestione delle licenze del client. Espone attivazione,\
    \ rilascio di una nuova licenza e verifica dello stato corrente."
  title: Licence API
  version: 1.0.0
servers:
- description: Server locale di sviluppo
  url: https://localhost:5001
tags:
- description: Operazioni sulle licenze
  name: Licence
paths:
  /api/licence/activate:
    post:
      description: "Invocata la prima volta che il client comunica col server. Genera\
        \ una nuova licenza associata al cliente, con identificativo alfanumerico\
        \ composto da numero commessa (LDK) + data/ora di attivazione + id cliente,\
        \ e scadenza calcolata dal server."
      operationId: ActivateLicence
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateLicenceRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Licenza"
          description: Licenza attivata con successo
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Richiesta non valida
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Cliente non trovato
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Una licenza attiva esiste gia' per il cliente
      summary: Attiva la licenza del cliente alla prima comunicazione col server
      tags:
      - Licence
  /api/licence/new:
    post:
      description: "Invocata dal client per ottenere una nuova licenza (p.es. dopo\
        \ scadenza e pagamento avvenuto). Il server genera il file di licenza in locale\
        \ e lo restituisce al client come download binario. I metadati della licenza\
        \ (id, scadenza, pagato) vengono propagati tramite response header, mentre\
        \ il body contiene il file stesso."
      operationId: GetNewLicence
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetNewLicenceRequest"
        required: true
      responses:
        "200":
          content:
            application/octet-stream:
              schema:
                description: Contenuto del file di licenza generato dal server
                format: binary
                type: string
          description: File di licenza generato
          headers:
            Content-Disposition:
              description: Nome del file di licenza proposto per il salvataggio
              explode: false
              schema:
                example: attachment; filename="LDK-2026-0001-20260422T143000-CUST-042.lic"
                type: string
              style: simple
            X-Licence-Id:
              description: Identificativo alfanumerico della licenza contenuta nel
                file
              explode: false
              schema:
                type: string
              style: simple
            X-Licence-Scadenza:
              description: Data/ora di scadenza della licenza (ISO 8601)
              explode: false
              schema:
                format: date-time
                type: string
              style: simple
            X-Licence-Pagato:
              description: Indica se la licenza e' stata pagata
              explode: false
              schema:
                type: boolean
              style: simple
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Richiesta non valida
        "402":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: "Licenza precedente non pagata, nuova emissione non consentita"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Cliente non trovato
      summary: Rilascia una nuova licenza al cliente come file da scaricare
      tags:
      - Licence
  /api/licence/state:
    get:
      description: "Restituisce lo stato della licenza identificata da licenceId:\
        \ validita', data di scadenza, flag di pagamento. Puo' essere usata anche\
        \ come heartbeat del client (monitoraggio ogni 5 minuti)."
      operationId: CheckLicenceState
      parameters:
      - description: Identificativo alfanumerico della licenza
        explode: true
        in: query
        name: licenceId
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicenceStateResponse"
          description: Stato della licenza
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Licenza non trovata
      summary: Verifica lo stato corrente di una licenza
      tags:
      - Licence
components:
  schemas:
    ActivateLicenceRequest:
      example:
        clientId: clientId
        numeroCommessa: LDK-2026-0001
      properties:
        clientId:
          description: Identificativo del cliente
          type: string
        numeroCommessa:
          description: "Numero di commessa LDK, entra nella composizione dell'ID licenza"
          example: LDK-2026-0001
          type: string
      required:
      - clientId
      - numeroCommessa
      type: object
    GetNewLicenceRequest:
      example:
        previousLicenceId: previousLicenceId
        clientId: clientId
      properties:
        clientId:
          description: Identificativo del cliente che richiede la nuova licenza
          type: string
        previousLicenceId:
          description: "Identificativo della licenza precedente (opzionale, utile\
            \ per tracciamento)"
          type: string
      required:
      - clientId
      type: object
    Licenza:
      example:
        pagato: true
        scadenza: 2000-01-23T04:56:07.000+00:00
        id: LDK-2026-0001-20260422T143000-CUST-042
      properties:
        id:
          description: "Identificativo alfanumerico: numeroCommessa (LDK) + data/ora\
            \ attivazione + idCliente"
          example: LDK-2026-0001-20260422T143000-CUST-042
          type: string
        scadenza:
          description: Data/ora di scadenza della licenza (2h o 11min dopo l'attivazione)
          format: date-time
          type: string
        pagato:
          description: Indica se la licenza e' stata pagata
          type: boolean
      required:
      - id
      - pagato
      - scadenza
      type: object
    LicenceStateResponse:
      example:
        pagato: true
        scadenza: 2000-01-23T04:56:07.000+00:00
        serverTime: 2000-01-23T04:56:07.000+00:00
        id: id
        scaduta: true
      properties:
        id:
          description: Identificativo alfanumerico della licenza
          type: string
        scadenza:
          description: Data/ora di scadenza
          format: date-time
          type: string
        pagato:
          description: Licenza pagata
          type: boolean
        scaduta:
          description: True se la scadenza e' gia' passata al momento della risposta
          type: boolean
        serverTime:
          description: Istante del server al momento della verifica
          format: date-time
          type: string
      required:
      - id
      - pagato
      - scadenza
      - scaduta
      type: object
    ErrorResponse:
      example:
        code: code
        message: message
      properties:
        code:
          description: Codice errore applicativo
          type: string
        message:
          description: Descrizione leggibile dell'errore
          type: string
      required:
      - code
      - message
      type: object

